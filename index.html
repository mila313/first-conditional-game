<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>First Conditional Quest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div id="menu">
    <h1>🎮 First Conditional Quest</h1>
    <p>A2 Grammar Adventure</p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="game" class="hidden">

    <div id="top">
      <div id="score">Score: 0</div>
      <div id="progress">1 / 5</div>
    </div>

    <h2 id="question"></h2>

    <div id="answers"></div>

    <p id="message"></p>

    <button id="next" onclick="nextQuestion()">Next</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
